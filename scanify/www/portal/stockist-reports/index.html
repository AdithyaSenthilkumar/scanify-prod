{% extends "templates/portal_base.html" %}

{% block title %}Stockist Reports{% endblock %}

{% block portal_content %}
<div class="portal-page stockist-reports-page">
    <!-- Page Header -->
    <div class="page-header d-flex justify-content-between align-items-center mb-4 flex-wrap d-print-none" style="gap:10px;">
        <div>
            <h1 class="page-title"><i class="fa fa-warehouse"></i> Stockist Reports</h1>
            <p class="page-subtitle text-muted mb-0">{{ division }} Division</p>
        </div>
    </div>

    <!-- Report Type & Filters Card -->
    <div class="card shadow-sm border-0 mb-3 d-print-none" id="filters-card">
        <div class="card-body py-3 px-3">
            <!-- Row 1: Report Type Selector -->
            <div class="row mb-3">
                <div class="col-md-6">
                    <label class="filter-label">Report Type</label>
                    <select class="form-control" id="report-type" onchange="onReportTypeChange()">
                        <option value="">-- Select Report --</option>
                        <option value="primary_sales">1. Stockist Wise Primary Sales Report</option>
                        <option value="secondary_sales">2. Stockist Wise Secondary Sales Report</option>
                        <option value="moving_trend">3. Moving Trend – Stockist Wise</option>
                        <option value="closing_stock">4. Stockist Wise Closing Stock Report</option>
                        <option value="hq_wise">5. HQ Wise Stockist Report</option>
                        <option value="address">6. Stockist Address Report</option>
                    </select>
                </div>
            </div>

            <!-- Dynamic Filters -->
            <div id="dynamic-filters" style="display:none;">
                <hr class="my-2">
                <div class="row" style="row-gap:12px;">
                    <!-- Sales Type (Reports 1 & 3) -->
                    <div class="col-md-3 col-6 filter-field" data-reports="primary_sales">
                        <label class="filter-label">Sales Type</label>
                        <select class="form-control form-control-sm" id="f-sales-type">
                            <option value="primary">Primary</option>
                            <option value="creditnote">Credit Note</option>
                        </select>
                    </div>
                    <div class="col-md-3 col-6 filter-field" data-reports="moving_trend">
                        <label class="filter-label">Sales Type</label>
                        <select class="form-control form-control-sm" id="f-sales-type-trend">
                            <option value="secondary">Secondary</option>
                            <option value="primary">Primary</option>
                        </select>
                    </div>

                    <!-- Region (Reports 1,2,4,5,6) -->
                    <div class="col-md-3 col-6 filter-field" data-reports="primary_sales,secondary_sales,closing_stock,hq_wise,address">
                        <label class="filter-label">Region</label>
                        <select class="form-control form-control-sm" id="f-region">
                            <option value="">All Regions</option>
                            {% for r in regions %}
                            <option value="{{ r }}">{{ r }}</option>
                            {% endfor %}
                        </select>
                    </div>

                    <!-- From Date (Reports 1,2,4) -->
                    <div class="col-md-3 col-6 filter-field" data-reports="primary_sales,secondary_sales,closing_stock">
                        <label class="filter-label">From Date</label>
                        <input type="date" class="form-control form-control-sm" id="f-from-date">
                    </div>

                    <!-- To Date (Reports 1,2,4) -->
                    <div class="col-md-3 col-6 filter-field" data-reports="primary_sales,secondary_sales,closing_stock">
                        <label class="filter-label">To Date</label>
                        <input type="date" class="form-control form-control-sm" id="f-to-date">
                    </div>

                    <!-- Stockist Code (Report 3) -->
                    <div class="col-md-3 col-6 filter-field" data-reports="moving_trend">
                        <label class="filter-label">Stockist</label>
                        <select class="form-control form-control-sm" id="f-stockist">
                            <option value="">-- Select Stockist --</option>
                            {% for s in stockists %}
                            <option value="{{ s.code }}">{{ s.code }} – {{ s.name }}</option>
                            {% endfor %}
                        </select>
                    </div>

                    <!-- Criteria (Report 6) -->
                    <div class="col-md-3 col-6 filter-field" data-reports="address">
                        <label class="filter-label">Criteria</label>
                        <select class="form-control form-control-sm" id="f-criteria">
                            <option value="ALL">All</option>
                            <option value="HQ WISE">HQ Wise</option>
                            <option value="TEAM WISE">Team Wise</option>
                            <option value="CITY WISE">City Wise</option>
                            <option value="STOCKIST NAME">Stockist Name</option>
                        </select>
                    </div>
                </div>

                <!-- Action Buttons -->
                <div class="d-flex mt-3" style="gap:10px;">
                    <button class="btn btn-primary btn-sm" id="btn-generate" onclick="generateReport()">
                        <i class="fa fa-search mr-1"></i> Generate Report
                    </button>
                    <button class="btn btn-outline-success btn-sm" id="btn-excel" onclick="downloadExcel()" style="display:none;">
                        <i class="fa fa-file-excel mr-1"></i> Download Excel
                    </button>
                    <button class="btn btn-outline-danger btn-sm" id="btn-pdf" onclick="downloadPDF()" style="display:none;">
                        <i class="fa fa-file-pdf mr-1"></i> Download PDF
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Report Output Area -->
    <div id="report-output" style="display:none;">
        <!-- Print Header (visible only in print) -->
        <div class="d-none d-print-block mb-3 text-center">
            <h2 id="print-title"></h2>
            <h5 id="print-subtitle" class="text-muted"></h5>
            <hr>
        </div>

        <div class="card shadow-sm border-0 report-card">
            <div class="card-header bg-white d-flex justify-content-between align-items-center d-print-none">
                <div>
                    <strong id="report-title"></strong>
                    <span class="text-muted ml-2" id="report-subtitle"></span>
                </div>
                <span class="badge badge-secondary" id="report-count"></span>
            </div>
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-bordered table-sm report-table mb-0" id="report-table">
                        <thead id="report-thead"></thead>
                        <tbody id="report-tbody"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <!-- Loading Spinner -->
    <div id="report-loading" style="display:none;" class="text-center py-5">
        <div class="spinner-border text-primary" role="status" style="width:3rem;height:3rem;"></div>
        <p class="text-muted mt-3">Generating report…</p>
    </div>

    <!-- Empty State -->
    <div id="report-empty" style="display:none;" class="text-center py-5">
        <i class="fa fa-inbox fa-3x text-muted mb-3"></i>
        <p class="text-muted">No data found for the selected criteria.</p>
    </div>
</div>

<style>
    .filter-label {
        font-size: 11px;
        font-weight: 600;
        text-transform: uppercase;
        color: var(--color-text-muted, #64748b);
        letter-spacing: 0.5px;
        margin-bottom: 4px;
        display: block;
    }
    .report-table th,
    .report-table td {
        font-size: 12px;
        vertical-align: middle;
        white-space: nowrap;
    }
    .report-table th {
        text-align: center;
        background: var(--color-primary, #1e293b);
        color: #fff;
        position: sticky;
        top: 0;
        z-index: 2;
    }
    .report-table .group-row td {
        background: #e8edf3;
        font-weight: 700;
        font-size: 12px;
        color: var(--color-primary, #1e293b);
    }
    .report-table .text-right { text-align: right !important; }

    .badge-secondary {
        background: var(--color-accent, #4f46e5);
        color: #fff;
        font-size: 12px;
        padding: 4px 10px;
        border-radius: var(--radius-full, 9999px);
    }

    @media print {
        @page { size: landscape; margin: 1cm; }
        body { font-size: 9pt; background: #fff; }
        .d-print-none { display: none !important; }
        .portal-sidebar, .portal-navbar { display: none !important; }
        .portal-main { margin-left: 0 !important; width: 100% !important; padding: 0 !important; }
        .report-card { box-shadow: none !important; border: none !important; }
        .report-table th { background: #1e293b !important; color: #fff !important; }
        .report-table .group-row td { background: #e8edf3 !important; }
        * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
    }
</style>
{% endblock %}

{% block scripts %}
<!-- jsPDF for client-side PDF -->
<script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jspdf-autotable@3.8.2/dist/jspdf.plugin.autotable.min.js"></script>

<script>
const DIVISION = "{{ division }}";
let currentReportType = "";
let currentReportData = null;
let currentReportMeta = {};

// ─────────────────────────────────────────────────────────────
// Filter visibility logic
// ─────────────────────────────────────────────────────────────
function onReportTypeChange() {
    currentReportType = document.getElementById("report-type").value;
    const filtersDiv = document.getElementById("dynamic-filters");
    if (!currentReportType) {
        filtersDiv.style.display = "none";
        document.getElementById("report-output").style.display = "none";
        document.getElementById("report-empty").style.display = "none";
        return;
    }
    filtersDiv.style.display = "block";

    // Show/hide filter fields based on data-reports attribute
    document.querySelectorAll(".filter-field").forEach(el => {
        const reports = el.getAttribute("data-reports").split(",");
        el.style.display = reports.includes(currentReportType) ? "" : "none";
    });

    // Hide previous results
    document.getElementById("report-output").style.display = "none";
    document.getElementById("report-empty").style.display = "none";
    document.getElementById("btn-excel").style.display = "none";
    document.getElementById("btn-pdf").style.display = "none";
}

// ─────────────────────────────────────────────────────────────
// Generate Report
// ─────────────────────────────────────────────────────────────
function generateReport() {
    if (!currentReportType) return showAlert("Please select a report type", "warning");

    const params = buildParams();
    const endpointMap = {
        primary_sales: "scanify.api.get_stockist_primary_sales_report",
        secondary_sales: "scanify.api.get_stockist_secondary_sales_report",
        moving_trend: "scanify.api.get_stockist_moving_trend_report",
        closing_stock: "scanify.api.get_stockist_closing_stock_report",
        hq_wise: "scanify.api.get_hq_wise_stockist_report",
        address: "scanify.api.get_stockist_address_report",
    };

    document.getElementById("report-loading").style.display = "block";
    document.getElementById("report-output").style.display = "none";
    document.getElementById("report-empty").style.display = "none";

    $.ajax({
        url: "/api/method/" + endpointMap[currentReportType],
        type: "POST",
        contentType: "application/json",
        headers: { "X-Frappe-CSRF-Token": frappe.csrf_token },
        data: JSON.stringify(params),
        success: function(r) {
            document.getElementById("report-loading").style.display = "none";
            if (r && r.message && r.message.success !== false) {
                currentReportData = r.message;
                renderReport(r.message);
            } else {
                const msg = (r && r.message && r.message.message) || "Failed to fetch report data";
                showAlert(msg, "danger");
            }
        },
        error: function(xhr) {
            document.getElementById("report-loading").style.display = "none";
            let msg = "Network error. Please try again.";
            try { msg = JSON.parse(xhr.responseText).exc || msg; } catch(e) {}
            showAlert(msg, "danger");
        }
    });
}

function buildParams() {
    const p = { division: DIVISION };
    const region = document.getElementById("f-region").value;
    const fromDate = document.getElementById("f-from-date").value;
    const toDate = document.getElementById("f-to-date").value;

    if (currentReportType === "primary_sales") {
        p.sales_type = document.getElementById("f-sales-type").value;
        if (region) p.region = region;
        if (fromDate) p.from_date = fromDate;
        if (toDate) p.to_date = toDate;
    } else if (currentReportType === "secondary_sales" || currentReportType === "closing_stock") {
        if (region) p.region = region;
        if (fromDate) p.from_date = fromDate;
        if (toDate) p.to_date = toDate;
    } else if (currentReportType === "moving_trend") {
        p.sales_type = document.getElementById("f-sales-type-trend").value;
        p.stockist_code = document.getElementById("f-stockist").value;
    } else if (currentReportType === "hq_wise") {
        if (region) p.region = region;
    } else if (currentReportType === "address") {
        if (region) p.region = region;
        p.criteria = document.getElementById("f-criteria").value;
    }
    return p;
}

// ─────────────────────────────────────────────────────────────
// Render Report
// ─────────────────────────────────────────────────────────────
function renderReport(result) {
    const thead = document.getElementById("report-thead");
    const tbody = document.getElementById("report-tbody");
    thead.innerHTML = "";
    tbody.innerHTML = "";

    const renderers = {
        primary_sales: renderPrimarySales,
        secondary_sales: renderSecondarySales,
        moving_trend: renderMovingTrend,
        closing_stock: renderClosingStock,
        hq_wise: renderHQWise,
        address: renderAddress,
    };

    const renderer = renderers[currentReportType];
    if (renderer) renderer(result, thead, tbody);

    const dataLen = getDataLength(result);
    if (dataLen === 0) {
        document.getElementById("report-output").style.display = "none";
        document.getElementById("report-empty").style.display = "block";
        document.getElementById("btn-excel").style.display = "none";
        document.getElementById("btn-pdf").style.display = "none";
        return;
    }

    document.getElementById("report-output").style.display = "block";
    document.getElementById("report-empty").style.display = "none";
    document.getElementById("btn-excel").style.display = "";
    document.getElementById("btn-pdf").style.display = "";
    document.getElementById("report-count").textContent = dataLen + " rows";

    // Set header text
    const titles = {
        primary_sales: "Stockist Wise Primary Sales Report",
        secondary_sales: "Stockist Wise Secondary Sales Report",
        moving_trend: "Moving Trend – Stockist Wise",
        closing_stock: "Stockist Wise Closing Stock Report",
        hq_wise: "HQ Wise Stockist Report",
        address: "Stockist Address Report",
    };
    const region = document.getElementById("f-region").value || "All Regions";
    const fromDate = document.getElementById("f-from-date").value;
    const toDate = document.getElementById("f-to-date").value;
    let subtitle = `Region: ${region}`;
    if (fromDate && toDate) subtitle += ` | Period: ${fromDate} to ${toDate}`;

    if (currentReportType === "moving_trend") {
        const stk = document.getElementById("f-stockist");
        const stkLabel = stk.options[stk.selectedIndex]?.text || "";
        subtitle = `Stockist: ${stkLabel}`;
        if (result.fy_label) subtitle += ` | ${result.fy_label}`;
    }

    currentReportMeta = {
        title: titles[currentReportType] + " – " + DIVISION,
        subtitle: subtitle,
    };
    document.getElementById("report-title").textContent = currentReportMeta.title;
    document.getElementById("report-subtitle").textContent = subtitle;
    document.getElementById("print-title").textContent = currentReportMeta.title;
    document.getElementById("print-subtitle").textContent = subtitle;
}

function getDataLength(result) {
    if (currentReportType === "hq_wise") {
        return (result.data || []).reduce((s, g) => s + g.stockists.length, 0);
    }
    return (result.data || []).length;
}

function th(text) { return `<th>${text}</th>`; }
function td(text, cls) { return `<td class="${cls || ''}">${text ?? ''}</td>`; }
function fmt(n) { return n != null ? Number(n).toLocaleString("en-IN", {minimumFractionDigits: 2, maximumFractionDigits: 2}) : "0.00"; }
function fmtQty(n) { return n != null ? Number(n).toLocaleString("en-IN", {minimumFractionDigits: 0, maximumFractionDigits: 2}) : "0"; }

// ---------- Report 1: Primary Sales ----------
function renderPrimarySales(result, thead, tbody) {
    thead.innerHTML = `<tr>${th("Stockist Code")}${th("Stockist Name")}${th("Product Code")}${th("Product Name")}${th("Pack")}${th("Quantity")}${th("Value (PTS)")}</tr>`;
    let currentStk = null;
    (result.data || []).forEach(r => {
        if (r.stockist_code !== currentStk) {
            currentStk = r.stockist_code;
            tbody.innerHTML += `<tr class="group-row"><td colspan="7">${esc(r.stockist_name)} (${esc(r.stockist_code)})</td></tr>`;
        }
        tbody.innerHTML += `<tr>${td(r.stockist_code)}${td(r.stockist_name)}${td(r.product_code)}${td(r.product_name)}${td(r.pack)}${td(fmtQty(r.total_qty), "text-right")}${td(fmt(r.total_value), "text-right")}</tr>`;
    });
}

// ---------- Report 2: Secondary Sales ----------
function renderSecondarySales(result, thead, tbody) {
    thead.innerHTML = `<tr>${th("Stockist Code")}${th("Stockist Name")}${th("Product Code")}${th("Product Name")}${th("Pack")}${th("Quantity")}${th("Value (PTS)")}</tr>`;
    let currentStk = null;
    (result.data || []).forEach(r => {
        if (r.stockist_code !== currentStk) {
            currentStk = r.stockist_code;
            tbody.innerHTML += `<tr class="group-row"><td colspan="7">${esc(r.stockist_name)} (${esc(r.stockist_code)})</td></tr>`;
        }
        tbody.innerHTML += `<tr>${td(r.stockist_code)}${td(r.stockist_name)}${td(r.product_code)}${td(r.product_name)}${td(r.pack)}${td(fmtQty(r.total_qty), "text-right")}${td(fmt(r.total_value), "text-right")}</tr>`;
    });
}

// ---------- Report 3: Moving Trend ----------
function renderMovingTrend(result, thead, tbody) {
    const ml = ["Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec", "Jan", "Feb", "Mar"];
    thead.innerHTML = `<tr>${th("Product Code")}${th("Product Name")}${th("Pack")}${ml.map(m => th(m)).join("")}${th("Total")}</tr>`;
    (result.data || []).forEach(r => {
        let row = `${td(r.product_code)}${td(r.product_name)}${td(r.pack)}`;
        r.months.forEach(v => { row += td(fmtQty(v), "text-right"); });
        row += td(fmtQty(r.total), "text-right font-weight-bold");
        tbody.innerHTML += `<tr>${row}</tr>`;
    });
}

// ---------- Report 4: Closing Stock ----------
function renderClosingStock(result, thead, tbody) {
    thead.innerHTML = `<tr>${th("Stockist Code")}${th("Stockist Name")}${th("Product Code")}${th("Product Name")}${th("Pack")}${th("Opening")}${th("Purchase")}${th("Sales")}${th("Free")}${th("Scheme Free")}${th("Closing")}</tr>`;
    let currentStk = null;
    (result.data || []).forEach(r => {
        if (r.stockist_code !== currentStk) {
            currentStk = r.stockist_code;
            tbody.innerHTML += `<tr class="group-row"><td colspan="11">${esc(r.stockist_name)} (${esc(r.stockist_code)})</td></tr>`;
        }
        tbody.innerHTML += `<tr>${td(r.stockist_code)}${td(r.stockist_name)}${td(r.product_code)}${td(r.product_name)}${td(r.pack)}${td(fmtQty(r.opening_qty), "text-right")}${td(fmtQty(r.purchase_qty), "text-right")}${td(fmtQty(r.sales_qty), "text-right")}${td(fmtQty(r.free_qty), "text-right")}${td(fmtQty(r.scheme_free_qty), "text-right")}${td(fmtQty(r.closing_qty), "text-right")}</tr>`;
    });
}

// ---------- Report 5: HQ Wise Stockist ----------
function renderHQWise(result, thead, tbody) {
    thead.innerHTML = `<tr>${th("HQ")}${th("HQ Name")}${th("Team")}${th("Region")}${th("Stockist Code")}${th("Stockist Name")}</tr>`;
    (result.data || []).forEach(g => {
        tbody.innerHTML += `<tr class="group-row"><td colspan="6">${esc(g.hq_name)} (${esc(g.hq_code)})</td></tr>`;
        g.stockists.forEach(s => {
            tbody.innerHTML += `<tr>${td(g.hq_code)}${td(g.hq_name)}${td(g.team)}${td(g.region)}${td(s.stockist_code)}${td(s.stockist_name)}</tr>`;
        });
    });
}

// ---------- Report 6: Address ----------
function renderAddress(result, thead, tbody) {
    thead.innerHTML = `<tr>${th("Stockist Code")}${th("Stockist Name")}${th("Address")}${th("City")}${th("Phone")}${th("HQ")}${th("Team")}${th("Region")}</tr>`;
    const groups = result.groups;
    if (groups && typeof groups === "object") {
        Object.keys(groups).forEach(grpName => {
            tbody.innerHTML += `<tr class="group-row"><td colspan="8">${esc(grpName)}</td></tr>`;
            groups[grpName].forEach(r => {
                tbody.innerHTML += `<tr>${td(r.stockist_code)}${td(r.stockist_name)}${td(r.address)}${td(r.city)}${td(r.phone)}${td(r.hq)}${td(r.team)}${td(r.region)}</tr>`;
            });
        });
    } else {
        (result.data || []).forEach(r => {
            tbody.innerHTML += `<tr>${td(r.stockist_code)}${td(r.stockist_name)}${td(r.address)}${td(r.city)}${td(r.phone)}${td(r.hq)}${td(r.team)}${td(r.region)}</tr>`;
        });
    }
}

function esc(s) {
    if (s == null) return "";
    const d = document.createElement("div");
    d.textContent = s;
    return d.innerHTML;
}

// ─────────────────────────────────────────────────────────────
// Download Excel (server-side)
// ─────────────────────────────────────────────────────────────
function downloadExcel() {
    if (!currentReportType) return;
    const params = buildParams();
    params.report_type = currentReportType;

    // Build query string
    const qs = Object.entries(params).map(([k, v]) => `${encodeURIComponent(k)}=${encodeURIComponent(v)}`).join("&");
    window.open(`/api/method/scanify.api.export_stockist_report_excel?${qs}`, "_blank");
}

// ─────────────────────────────────────────────────────────────
// Download PDF (client-side jsPDF)
// ─────────────────────────────────────────────────────────────
function downloadPDF() {
    if (!currentReportData) return;
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF({ orientation: "landscape", unit: "mm", format: "a4" });

    // Title
    doc.setFontSize(14);
    doc.text(currentReportMeta.title || "Stockist Report", 14, 15);
    doc.setFontSize(10);
    doc.setTextColor(100);
    doc.text(currentReportMeta.subtitle || "", 14, 22);
    doc.setTextColor(0);

    // Extract table data from the rendered HTML table
    const table = document.getElementById("report-table");
    const head = [];
    const body = [];

    table.querySelectorAll("thead tr").forEach(tr => {
        const row = [];
        tr.querySelectorAll("th").forEach(c => row.push(c.textContent.trim()));
        head.push(row);
    });

    table.querySelectorAll("tbody tr").forEach(tr => {
        const row = [];
        const isGroup = tr.classList.contains("group-row");
        tr.querySelectorAll("td").forEach(c => row.push(c.textContent.trim()));
        body.push({ cells: row, isGroup: isGroup });
    });

    doc.autoTable({
        head: head,
        body: body.map(r => r.cells),
        startY: 28,
        styles: { fontSize: 8, cellPadding: 1.5 },
        headStyles: { fillColor: [30, 41, 59], textColor: 255, fontStyle: "bold" },
        didParseCell: function(data) {
            if (data.section === "body" && body[data.row] && body[data.row].isGroup) {
                data.cell.styles.fillColor = [232, 237, 243];
                data.cell.styles.fontStyle = "bold";
            }
        },
        margin: { left: 14, right: 14 },
    });

    const filename = `${currentReportType}_${DIVISION}_${new Date().toISOString().slice(0,10)}.pdf`;
    doc.save(filename);
}
</script>
{% endblock %}
