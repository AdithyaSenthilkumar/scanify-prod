{% extends "templates/portal_base.html" %}

{% block title %}Scheme Requests{% endblock %}

{% block portal_content %}
<div class="portal-page scheme-list-page">
    <div class="page-header d-flex justify-content-between align-items-center">
        <div>
            <h1 class="page-title"><i class="fa fa-file-alt"></i> Scheme Requests</h1>
            <p class="page-subtitle">All scheme requests for <strong>{{ division }}</strong> division</p>
        </div>
        <div class="d-flex gap-2">
            <a href="/portal/scheme-repeat" class="btn btn-secondary">
                <i class="fa fa-redo"></i> Repeat Request
            </a>
            <a href="/portal/scheme-new" class="btn btn-primary">
                <i class="fa fa-plus"></i> New Scheme Request
            </a>
        </div>
    </div>

    <div class="card mb-4">
        <div class="card-body">
            <div class="row align-items-end">
                <div class="col-md-3">
                    <label><strong>Search</strong></label>
                    <input type="text" id="searchInput" class="form-control" placeholder="Doctor, Stockist, Scheme ID...">
                </div>
                <div class="col-md-2">
                    <label><strong>Status</strong></label>
                    <select id="statusFilter" class="form-control">
                        <option value="">All Status</option>
                        <option value="Pending">Pending</option>
                        <option value="Approved">Approved</option>
                        <option value="Rejected">Rejected</option>
                        <option value="Rerouted">Rerouted</option>
                    </select>
                </div>
                <div class="col-md-2">
                    <label><strong>Request Type</strong></label>
                    <select id="requestTypeFilter" class="form-control">
                        <option value="">All</option>
                        <option value="Original">Original</option>
                        <option value="Repeated">Repeated</option>
                    </select>
                </div>
                <div class="col-md-2">
                    <label><strong>From Date</strong></label>
                    <input type="date" id="fromDate" class="form-control">
                </div>
                <div class="col-md-2">
                    <label><strong>To Date</strong></label>
                    <input type="date" id="toDate" class="form-control">
                </div>
                <div class="col-md-1 d-flex gap-2">
                    <button class="btn btn-primary w-100" id="applyFilterBtn" onclick="loadSchemes()">
                        <i class="fa fa-filter"></i>
                    </button>
                    <button class="btn btn-secondary" onclick="clearFilters()">
                        <i class="fa fa-times"></i>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <div class="card">
        <div class="card-body p-0">
            <div id="schemesList">
                <div class="text-center p-5">
                    <i class="fa fa-spinner fa-spin fa-3x text-muted"></i>
                    <p class="mt-3 text-muted">Loading scheme requests...</p>
                </div>
            </div>
        </div>
    </div>

    <!-- Pagination -->
    <div id="scheme-pagination" class="d-flex justify-content-between align-items-center mt-3"></div>
</div>

<style>
    .scheme-list-page .status-badge {
        padding: 4px 10px;
        border-radius: 20px;
        font-size: 12px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.3px;
    }

    .scheme-list-page .status-Pending {
        background: #fffbeb;
        color: #b45309;
    }

    .scheme-list-page .status-Approved {
        background: #ecfdf5;
        color: #047857;
    }

    .scheme-list-page .status-Rejected {
        background: #fef2f2;
        color: #b91c1c;
    }

    .scheme-list-page .status-Rerouted {
        background: #eff6ff;
        color: #1d4ed8;
    }

    .scheme-list-page .scheme-id {
        font-weight: 600;
        color: #2563eb;
    }

    .gap-2 {
        gap: 8px;
    }
</style>
{% endblock %}

{% block scripts %}
<script>
    const SCHEME_PAGE_SIZE = 25;
    let schemeCurrentPage = 1;
    let allSchemes = [];

    function getActiveDivision() {
        try {
            const btn = document.querySelector('.division-name');
            if (btn && btn.textContent.trim()) return btn.textContent.trim();
        } catch (e) { }
        const match = document.cookie.match(/(?:^|;\s*)division=([^;]*)/);
        if (match) return decodeURIComponent(match[1]);
        return '{{ division }}';
    }

    $(document).ready(function () {
        loadSchemes();
    });

    function loadSchemes() {
        const filters = {
            status: $('#statusFilter').val(),
            request_type: $('#requestTypeFilter').val(),
            from_date: $('#fromDate').val(),
            to_date: $('#toDate').val(),
            search: $('#searchInput').val(),
        };

        $('#schemesList').html(`
        <div class="text-center p-5">
            <i class="fa fa-spinner fa-spin fa-3x text-muted"></i>
            <p class="mt-3 text-muted">Loading...</p>
        </div>
    `);

        $.ajax({
            url: '/api/method/scanify.api.get_scheme_list_portal',
            type: 'POST',
            contentType: 'application/json',
            headers: { 'X-Frappe-CSRF-Token': frappe.csrf_token },
            data: JSON.stringify({ division: getActiveDivision(), filters: JSON.stringify(filters) }),
            success: function (r) {
                if (r.message && r.message.success) {
                    allSchemes = r.message.data || [];
                    schemeCurrentPage = 1;
                    renderSchemes(allSchemes);
                } else {
                    showError(r.message && r.message.message ? r.message.message : 'Failed to load schemes');
                }
            },
            error: function (xhr) {
                console.error(xhr.responseText);
                showError('Error loading scheme requests');
            }
        });
    }

    function renderSchemes(schemes) {
        if (!schemes.length) {
            $('#schemesList').html(`
            <div class="text-center py-5 text-muted">
                <i class="fa fa-folder-open fa-3x mb-3 text-light"></i>
                <h5>No scheme requests found</h5>
                <p>Click 'New Scheme Request' to create one.</p>
            </div>
        `);
            document.getElementById('scheme-pagination').innerHTML = '';
            return;
        }

        const totalPages = Math.ceil(schemes.length / SCHEME_PAGE_SIZE) || 1;
        if (schemeCurrentPage > totalPages) schemeCurrentPage = totalPages;
        const start = (schemeCurrentPage - 1) * SCHEME_PAGE_SIZE;
        const pageSchemes = schemes.slice(start, start + SCHEME_PAGE_SIZE);

        let html = `<div class="table-responsive">
        <table class="table table-hover mb-0">
            <thead>
                <tr>
                    <th>Scheme ID</th>
                    <th>Date</th>
                    <th>Doctor</th>
                    <th>HQ</th>
                    <th>Stockist</th>
                    <th>Products</th>
                    <th class="text-right">Value (&#8377;)</th>
                    <th>Status</th>
                    <th>Type</th>
                    <th class="text-center">Actions</th>
                </tr>
            </thead>
            <tbody>`;

        pageSchemes.forEach(function (s) {
            const statusClass = { Approved: 'Approved', Pending: 'Pending', Rejected: 'Rejected', Rerouted: 'Rerouted' }[s.approval_status] || 'Pending';
            const dateStr = s.application_date ? s.application_date.substring(0, 10) : '-';
            const isRepeated = Number(s.repeated_request || 0) === 1;

            html += `<tr>
            <td><a href="/portal/scheme-detail?name=${s.name}" class="scheme-id">${s.name}</a></td>
            <td>${dateStr}</td>
            <td>
                <div>${s.doctor_name || '-'}</div>
                <small class="text-muted">${s.doctor_code || ''}</small>
            </td>
            <td>${s.hq_name || s.hq || '-'}</td>
            <td>
                <div>${s.stockist_name || '-'}</div>
                <small class="text-muted">${s.stockist_code || ''}</small>
            </td>
            <td><span class="badge badge-secondary">${s.product_count || 0}</span></td>
            <td class="text-right"><strong>&#8377;${formatCurrency(s.total_scheme_value || 0)}</strong></td>
            <td><span class="status-badge status-${statusClass}">${s.approval_status}</span></td>
            <td>${isRepeated ? '<span class="badge badge-info">Repeated</span>' : '<span class="badge badge-light">Original</span>'}</td>
            <td class="text-center">
                <a href="/portal/scheme-detail?name=${s.name}" class="btn btn-sm btn-secondary" title="View">
                    <i class="fa fa-eye"></i> View
                </a>
            </td>
        </tr>`;
        });

        html += '</tbody></table></div>';
        $('#schemesList').html(html);
        renderSchemePagination(schemes.length);
    }

    function renderSchemePagination(total) {
        const container = document.getElementById('scheme-pagination');
        if (total <= SCHEME_PAGE_SIZE) { container.innerHTML = ''; return; }
        const totalPages = Math.ceil(total / SCHEME_PAGE_SIZE);
        const start = (schemeCurrentPage - 1) * SCHEME_PAGE_SIZE + 1;
        const end = Math.min(schemeCurrentPage * SCHEME_PAGE_SIZE, total);
        let html = '<small class="text-muted">Showing ' + start + '-' + end + ' of ' + total + '</small>';
        html += '<nav><ul class="pagination pagination-sm mb-0">';
        html += '<li class="page-item ' + (schemeCurrentPage===1?'disabled':'') + '"><a class="page-link" href="#" onclick="goToSchemePage(' + (schemeCurrentPage-1) + ');return false;">&laquo;</a></li>';
        var sp = Math.max(1, schemeCurrentPage-2), ep = Math.min(totalPages, sp+4);
        if (ep-sp<4) sp = Math.max(1, ep-4);
        for (var i=sp;i<=ep;i++) html += '<li class="page-item '+(i===schemeCurrentPage?'active':'')+'"><a class="page-link" href="#" onclick="goToSchemePage('+i+');return false;">'+i+'</a></li>';
        html += '<li class="page-item ' + (schemeCurrentPage===totalPages?'disabled':'') + '"><a class="page-link" href="#" onclick="goToSchemePage(' + (schemeCurrentPage+1) + ');return false;">&raquo;</a></li>';
        html += '</ul></nav>';
        container.innerHTML = html;
    }

    function goToSchemePage(page) {
        const totalPages = Math.ceil(allSchemes.length / SCHEME_PAGE_SIZE);
        if (page < 1 || page > totalPages) return;
        schemeCurrentPage = page;
        renderSchemes(allSchemes);
    }

    function clearFilters() {
        $('#searchInput').val('');
        $('#statusFilter').val('');
        $('#requestTypeFilter').val('');
        $('#fromDate').val('');
        $('#toDate').val('');
        loadSchemes();
    }

    function formatCurrency(v) {
        return new Intl.NumberFormat('en-IN', { minimumFractionDigits: 2, maximumFractionDigits: 2 }).format(v || 0);
    }

    function showError(msg) {
        $('#schemesList').html(`<div class="alert alert-danger m-3"><i class="fa fa-exclamation-triangle"></i> ${msg}</div>`);
    }
</script>
{% endblock %}
