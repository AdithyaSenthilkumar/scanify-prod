{% extends "templates/portal_base.html" %}

{% block title %}Scheme Requests{% endblock %}

{% block portal_content %}
<div class="portal-page scheme-list-page">
    <div class="page-header d-flex justify-content-between align-items-center mb-4">
        <div>
            <h1 class="page-title"><i class="fa fa-file-alt"></i> Scheme Requests</h1>
            <p class="page-subtitle text-muted">All scheme requests for <strong>{{ division }}</strong> division</p>
        </div>
        <a href="/portal/scheme-new" class="btn btn-primary">
            <i class="fa fa-plus"></i> New Scheme Request
        </a>
    </div>

    <!-- Filters -->
    <div class="card shadow-sm border-0 mb-4">
        <div class="card-body bg-light rounded px-4 py-3 border">
            <div class="row align-items-end g-3">
                <div class="col-md-4">
                    <label class="form-label"><strong>Search</strong></label>
                    <div class="input-group">
                        <div class="input-group-prepend">
                            <span class="input-group-text bg-white"><i class="fa fa-search text-muted"></i></span>
                        </div>
                        <input type="text" id="searchInput" class="form-control"
                            placeholder="Doctor, Stockist, Scheme ID...">
                    </div>
                </div>
                <div class="col-md-2">
                    <label class="form-label"><strong>Status</strong></label>
                    <select id="statusFilter" class="form-control">
                        <option value="">All Status</option>
                        <option value="Pending">Pending</option>
                        <option value="Approved">Approved</option>
                        <option value="Rejected">Rejected</option>
                        <option value="Rerouted">Rerouted</option>
                    </select>
                </div>
                <div class="col-md-2">
                    <label class="form-label"><strong>From Date</strong></label>
                    <input type="date" id="fromDate" class="form-control">
                </div>
                <div class="col-md-2">
                    <label class="form-label"><strong>To Date</strong></label>
                    <input type="date" id="toDate" class="form-control">
                </div>
                <div class="col-md-2 d-flex gap-2">
                    <button class="btn btn-primary flex-fill" id="applyFilterBtn" onclick="loadSchemes()">
                        <i class="fa fa-filter"></i> Filter
                    </button>
                    <button class="btn btn-outline-secondary" onclick="clearFilters()">
                        <i class="fa fa-times"></i>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- List -->
    <div class="card shadow-sm border-0">
        <div class="card-body p-0 border">
            <div id="schemesList">
                <div class="text-center p-5">
                    <i class="fa fa-spinner fa-spin fa-3x text-muted"></i>
                    <p class="mt-3 text-muted">Loading scheme requests...</p>
                </div>
            </div>
        </div>
    </div>
</div>

<style>
    .scheme-list-page .status-badge {
        padding: 4px 10px;
        border-radius: 20px;
        font-size: 12px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.5px;
    }

    .scheme-list-page .status-Pending {
        background: #fff3cd;
        color: #856404;
    }

    .scheme-list-page .status-Approved {
        background: #d1e7dd;
        color: #0a5e36;
    }

    .scheme-list-page .status-Rejected {
        background: #f8d7da;
        color: #842029;
    }

    .scheme-list-page .status-Rerouted {
        background: #cff4fc;
        color: #055160;
    }

    .scheme-list-page .table td,
    .scheme-list-page .table th {
        vertical-align: middle;
    }

    .scheme-list-page .scheme-id {
        font-weight: 600;
        color: #2563eb;
    }

    .gap-2 {
        gap: 8px;
    }
</style>
{% endblock %}

{% block scripts %}
<script>
    const DIVISION = "{{ division }}";
    const IS_MANAGER = {{ 'true' if is_manager else 'false' }};

    $(document).ready(function () {
        loadSchemes();
    });

    function loadSchemes() {
        const filters = {
            status: $('#statusFilter').val(),
            from_date: $('#fromDate').val(),
            to_date: $('#toDate').val(),
            search: $('#searchInput').val(),
        };

        $('#schemesList').html(`
        <div class="text-center p-5">
            <i class="fa fa-spinner fa-spin fa-3x text-muted"></i>
            <p class="mt-3 text-muted">Loading...</p>
        </div>
    `);

        $.ajax({
            url: '/api/method/scanify.api.get_scheme_list_portal',
            type: 'POST',
            contentType: 'application/json',
            headers: {
                'X-Frappe-CSRF-Token': frappe.csrf_token
            },
            data: JSON.stringify({ division: DIVISION, filters: JSON.stringify(filters) }),
            success: function (r) {
                if (r.message && r.message.success) {
                    renderSchemes(r.message.data);
                } else {
                    showError(r.message && r.message.message ? r.message.message : 'Failed to load schemes');
                }
            },
            error: function (xhr) {
                console.error(xhr.responseText);
                showError('Error loading scheme requests');
            }
        });
    }

    function renderSchemes(schemes) {
        if (!schemes || schemes.length === 0) {
            $('#schemesList').html(`
            <div class="text-center py-5 text-muted">
                <i class="fa fa-folder-open fa-3x mb-3 text-light"></i>
                <h5>No scheme requests found for ${DIVISION}</h5>
                <p>Click 'New Scheme Request' to create one.</p>
            </div>
        `);
            return;
        }

        let html = `<div class="table-responsive">
        <table class="table table-hover mb-0">
            <thead class="bg-light">
                <tr>
                    <th>Scheme ID</th>
                    <th>Date</th>
                    <th>Doctor</th>
                    <th>HQ</th>
                    <th>Stockist</th>
                    <th>Products</th>
                    <th class="text-right">Value (₹)</th>
                    <th>Status</th>
                    <th class="text-center">Actions</th>
                </tr>
            </thead>
            <tbody>`;

        schemes.forEach(function (s) {
            const statusClass = { Approved: 'Approved', Pending: 'Pending', Rejected: 'Rejected', Rerouted: 'Rerouted' }[s.approval_status] || 'Pending';
            const dateStr = s.application_date ? s.application_date.substring(0, 10) : '-';

            html += `<tr>
            <td><a href="/portal/scheme-detail?name=${s.name}" class="scheme-id">${s.name}</a></td>
            <td>${dateStr}</td>
            <td>
                <div>${s.doctor_name || '-'}</div>
                <small class="text-muted">${s.doctor_code || ''}</small>
            </td>
            <td>${s.hq || '-'}</td>
            <td>
                <div>${s.stockist_name || '-'}</div>
                <small class="text-muted">${s.stockist_code || ''}</small>
            </td>
            <td><span class="badge badge-secondary">${s.product_count || 0}</span></td>
            <td class="text-right"><strong>₹${formatCurrency(s.total_scheme_value || 0)}</strong></td>
            <td><span class="status-badge status-${statusClass}">${s.approval_status}</span></td>
            <td class="text-center">
                <a href="/portal/scheme-detail?name=${s.name}" class="btn btn-sm btn-outline-primary" title="View">
                    <i class="fa fa-eye"></i> View
                </a>
                ${s.approval_status === 'Approved' ? `
                <button class="btn btn-sm btn-outline-info ml-1" onclick="repeatScheme('${s.name}')" title="Repeat">
                    <i class="fa fa-redo"></i>
                </button>` : ''}
            </td>
        </tr>`;
        });

        html += '</tbody></table></div>';
        $('#schemesList').html(html);
    }

    function repeatScheme(name) {
        if (!confirm('Create a new scheme request based on ' + name + '?')) return;
        $.ajax({
            url: '/api/method/scanify.api.portal_repeat_scheme_request',
            type: 'POST',
            contentType: 'application/json',
            headers: {
                'X-Frappe-CSRF-Token': frappe.csrf_token
            },
            data: JSON.stringify({ source_name: name }),
            success: function (r) {
                if (r.message && r.message.success) {
                    showAlert('New scheme request created: ' + r.message.name, 'success');
                    setTimeout(() => window.location.href = '/portal/scheme-detail?name=' + r.message.name, 1200);
                } else {
                    showAlert((r.message && r.message.message) || 'Failed to repeat scheme', 'danger');
                }
            },
            error: function (xhr) {
                console.error(xhr.responseText);
                showAlert('Error repeating scheme', 'danger');
            }
        });
    }

    function clearFilters() {
        $('#searchInput').val('');
        $('#statusFilter').val('');
        $('#fromDate').val('');
        $('#toDate').val('');
        loadSchemes();
    }

    function formatCurrency(v) {
        return new Intl.NumberFormat('en-IN', { minimumFractionDigits: 2, maximumFractionDigits: 2 }).format(v || 0);
    }

    function showError(msg) {
        $('#schemesList').html(`<div class="alert alert-danger m-3"><i class="fa fa-exclamation-triangle"></i> ${msg}</div>`);
    }

    function showAlert(msg, type) {
        let a = $(`<div class="alert alert-${type} alert-dismissible fade show" role="alert" style="position:fixed;top:70px;right:20px;z-index:9999;min-width:300px;box-shadow:0 4px 6px rgba(0,0,0,.1);">
        <strong>${msg}</strong><button type="button" class="close" data-dismiss="alert">&times;</button></div>`);
        $('body').append(a);
        setTimeout(() => a.fadeOut(() => a.remove()), 4000);
    }
</script>
{% endblock %}
