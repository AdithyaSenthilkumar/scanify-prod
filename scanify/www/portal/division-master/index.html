{% extends "templates/portal_base.html" %}

{% block title %}Division Master{% endblock %}

{% block portal_content %}
<div class="portal-page masters-page">
    <!-- Page Header -->
    <div class="page-header">
        <h1 class="page-title"><i class="fa fa-sitemap"></i> Division Master</h1>
        <p class="page-subtitle">Manage all divisions in Scanify</p>
    </div>

    <!-- Action Bar -->
    <div class="card mb-3">
        <div class="card-body">
            <div class="row align-items-center">
                <div class="col-md-6">
                    <label><strong>Search</strong></label>
                    <input type="text" class="form-control" id="search-input" placeholder="Search divisions...">
                </div>
                <div class="col-md-3 offset-md-3">
                    <label>&nbsp;</label>
                    <div class="btn-group btn-block">
                        <button class="btn btn-primary" onclick="showAddModal()">
                            <i class="fa fa-plus"></i> Add New Division
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Data Table -->
    <div class="card">
        <div class="card-header">
            <i class="fa fa-list"></i> <span id="table-title">Division Master</span>
            <span class="badge badge-info ml-2" id="record-count">0</span>
        </div>
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-hover mb-0" id="data-table">
                    <thead id="table-header">
                        <!-- Dynamic headers -->
                    </thead>
                    <tbody id="table-body">
                        <tr>
                            <td colspan="10" class="text-center p-5">
                                <i class="fa fa-spinner fa-spin fa-3x text-muted"></i>
                                <p class="mt-3 text-muted">Loading data...</p>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<!-- Add/Edit Modal -->
<div class="modal fade" id="editModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="modalTitle">Add New Division</h5>
                <button type="button" class="close" data-dismiss="modal">&times;</button>
            </div>
            <div class="modal-body">
                <form id="edit-form">
                    <input type="hidden" id="record-id">
                    <div id="form-fields">
                        <!-- Dynamic form fields -->
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-dismiss="modal">Cancel</button>
                <button type="button" class="btn btn-primary" onclick="saveRecord()">
                    <i class="fa fa-save"></i> Save
                </button>
            </div>
        </div>
    </div>
</div>

<style>
    .masters-page {
        animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn {
        from {
            opacity: 0;
            transform: translateY(10px);
        }

        to {
            opacity: 1;
            transform: translateY(0);
        }
    }

    #data-table thead th {
        position: sticky;
        top: 0;
        background: var(--color-bg);
        z-index: 10;
        white-space: nowrap;
    }

    .action-buttons {
        white-space: nowrap;
    }

    .action-buttons .btn {
        padding: 4px 8px;
        font-size: 12px;
        margin-right: 4px;
    }
</style>
{% endblock %}

{% block scripts %}
<script>
    // Set single master mode BEFORE loading masters.js
    window.MASTERS_SINGLE_MODE = 'division';
</script>
<script src="/assets/scanify/js/masters.js"></script>
{% endblock %}
